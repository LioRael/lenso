  /oauth/authorize:
    get:
      tags:
      - auth
      operationId: auth_oidc_authorize
      parameters:
      - name: response_type
        in: query
        description: Must be `code`
        required: true
        schema:
          type: string
      - name: client_id
        in: query
        description: Registered OIDC client id
        required: true
        schema:
          type: string
      - name: redirect_uri
        in: query
        description: Registered redirect URI
        required: true
        schema:
          type: string
      - name: scope
        in: query
        description: Space-separated scopes including `openid`
        required: true
        schema:
          type: string
      - name: state
        in: query
        description: Opaque client state echoed to the redirect URI
        required: false
        schema:
          type: string
      - name: nonce
        in: query
        description: Opaque nonce stored with the authorization code
        required: false
        schema:
          type: string
      - name: code_challenge
        in: query
        description: PKCE S256 code challenge
        required: true
        schema:
          type: string
      - name: code_challenge_method
        in: query
        description: Must be `S256`
        required: true
        schema:
          type: string
      responses:
        '303':
          description: Redirects to the registered redirect URI with an authorization code
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
