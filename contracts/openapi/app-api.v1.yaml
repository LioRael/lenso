          $ref: '#/components/schemas/WorkflowDataContract'
          description: Versioned Event Contract that confirms the remote business effect was reversed.
        contract:
          $ref: '#/components/schemas/WorkflowDataContract'
          description: Versioned Event Contract used to request the compensation effect.
        name:
          type: string
          description: Stable compensation behavior identity within this Workflow Definition.
        order:
          type: integer
          format: int32
          description: Explicit deterministic execution order. Lower values execute first.
          minimum: 0
      additionalProperties: false
    WorkflowDataContract:
      type: object
      required:
      - contractId
      - version
      properties:
        contractId:
          type: string
        version:
          type: string
      additionalProperties: false
    WorkflowDefinition:
      type: object
      required:
      - protocol
      - owner
      - name
      - version
      - inputContract
      - resultContract
      - steps
      properties:
        inputContract:
          $ref: '#/components/schemas/WorkflowDataContract'
        name:
          type: string
          description: Stable workflow name within the owning Module.
        owner:
          type: string
          description: Stable Module identity that owns the workflow behavior.
        protocol:
          type: string
          description: Versioned declaration protocol, currently `lenso.workflow-definition.v1`.
        resultContract:
          $ref: '#/components/schemas/WorkflowDataContract'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepDeclaration'
          description: Ordered step metadata. Position in this vector is contract-significant.
        version:
          type: string
          description: Definition version pinned by every started instance.
      additionalProperties: false
    WorkflowRetryPolicyDeclaration:
      type: object
      required:
      - maxAttempts
      - delaysMs
      properties:
        delaysMs:
          type: array
          items:
            type: integer
            format: int64
            minimum: 0
          description: Delay before attempts 2..N. The length must equal `max_attempts` - 1.
        maxAttempts:
          type: integer
          format: int32
          description: Total attempts including the original execution.
          minimum: 0
      additionalProperties: false
    WorkflowStepDeclaration:
      type: object
      required:
      - name
      properties:
        compensation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowCompensationDeclaration'
            description: |-
              Optional compensation for the completed business effect produced by
              this step. The explicit order is evaluated across all completed effects
              when compensation is selected; it is independent from completion time.
        displayName:
          type:
          - string
          - 'null'
        name:
          type: string
        retryPolicy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowRetryPolicyDeclaration'
            description: |-
              Optional durable retry schedule. `max_attempts` includes the original
              attempt, while each delay schedules the following attempt.
        timeoutMs:
          type:
          - integer
          - 'null'
          format: int64
          description: Optional durable timeout applied independently to every attempt.
          minimum: 0
      additionalProperties: false
