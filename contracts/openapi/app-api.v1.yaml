openapi: 3.1.0
info:
  title: Lenso API
  description: Rust-first modular monolith API contract
  license:
    name: MIT
    identifier: MIT
  version: 1.0.0
paths:
  /.well-known/jwks.json:
    get:
      tags:
      - auth
      operationId: auth_oidc_jwks
      responses:
        '200':
          description: OIDC JSON Web Key Set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcJwksResponse'
        '404':
          description: OIDC provider is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Invalid OIDC provider configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /.well-known/openid-configuration:
    get:
      tags:
      - auth
      operationId: auth_oidc_provider_metadata
      responses:
        '200':
          description: OIDC provider metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderMetadataResponse'
        '404':
          description: OIDC provider is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Invalid OIDC provider configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/descriptors:
    get:
      tags:
      - admin-config
      operationId: admin_config_list_descriptors
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Registered config descriptors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDescriptorListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/values:
    get:
      tags:
      - admin-config
      operationId: admin_config_list_values
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Effective config values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValueListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/{service}/{key}:
    put:
      tags:
      - admin-config
      operationId: admin_config_put_value
      parameters:
      - name: service
        in: path
        description: 'Service key: a service name or `*` for shared'
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Config key
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigWriteRequest'
        required: true
      responses:
        '200':
          description: Value written
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigWriteResponse'
        '400':
          description: Value failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Config key is not editable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown config key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - admin-config
      operationId: admin_config_delete_value
      parameters:
      - name: service
        in: path
        description: 'Service key: a service name or `*` for shared'
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Config key
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Value reset to default
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigWriteResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown config key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/{service}/{key}/audit:
    get:
      tags:
      - admin-config
      operationId: admin_config_get_audit
      parameters:
      - name: service
        in: path
        description: Service key
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Config key
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Audit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigAuditListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/context:
    get:
      tags:
      - admin-system
      operationId: admin_context
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Current Runtime Console admin actor context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminContextResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Console admin scope is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/available-modules:
    get:
      tags:
      - admin-data
      operationId: admin_data_available_modules
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Available catalog services and linked modules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleRegistrySnapshotResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/available-modules/{module}/install:
    post:
      tags:
      - admin-data
      operationId: admin_data_install_available_module
      parameters:
      - name: module
        in: path
        description: Available catalog entry name
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Catalog install state written to host-local files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleInstallResponse'
        '400':
          description: Catalog entry cannot be installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown available module
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - admin-data
      operationId: admin_data_uninstall_available_module
      parameters:
      - name: module
        in: path
        description: Available module name
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Module install state removed from host-local files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleInstallResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown available module
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/launchpad:
    get:
      tags:
      - admin-data
      operationId: admin_data_launchpad
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
