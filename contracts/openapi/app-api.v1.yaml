      tags:
      - admin-data
      operationId: admin_data_service_system_release_train
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Applied system release train history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminServiceSystemReleaseTrainResponse'
        '401':
          description: Authentication is required
