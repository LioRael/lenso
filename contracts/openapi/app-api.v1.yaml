      operationId: admin_data_service_system_drift
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Service system drift against host-local state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminServiceSystemDriftResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/service-system/release-train:
