                $ref: '#/components/schemas/AdminLaunchpadDoctorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/launchpad/proof:
    get:
      tags:
      - admin-data
      operationId: admin_data_launchpad_proof
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Launchpad App Proof state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLaunchpadProofResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/module-registry/snapshot:
    get:
      tags:
      - admin-data
      operationId: admin_data_module_registry_snapshot
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Legacy alias for available catalog services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleRegistrySnapshotResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/modules:
    get:
      tags:
      - admin-data
      operationId: admin_data_list_modules
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: All module registry metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleMetadataListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/modules/refresh:
    post:
      tags:
      - admin-data
      operationId: admin_data_refresh_modules
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Module registry metadata snapshot after refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleMetadataListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Module registry refresh is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/schema:
    get:
      tags:
      - admin-data
      operationId: admin_data_list_schemas
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: All admin-capable modules' schemas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchemaListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/schema/refresh:
    post:
      tags:
      - admin-data
      operationId: admin_data_refresh_schemas
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Refreshed admin-capable modules' schemas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchemaRefreshResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Admin module refresh is unavailable or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/service-modules:
    get:
      tags:
      - admin-data
      operationId: admin_data_service_modules
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Service provider lifecycle state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminServiceModuleLifecycleResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/service-system:
    get:
      tags:
      - admin-data
      operationId: admin_data_service_system
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Service system graph
          content:
            application/json:
