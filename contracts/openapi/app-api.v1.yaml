openapi: 3.1.0
info:
  title: Lenso API
  description: Rust-first modular monolith API contract
  license:
    name: UNLICENSED
    identifier: UNLICENSED
  version: 1.0.0
paths:
  /admin/config/descriptors:
    get:
      tags:
      - admin-config
      operationId: admin_config_list_descriptors
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Registered config descriptors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDescriptorListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/values:
    get:
      tags:
      - admin-config
      operationId: admin_config_list_values
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Effective config values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValueListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/{service}/{key}:
    put:
      tags:
      - admin-config
      operationId: admin_config_put_value
      parameters:
      - name: service
        in: path
        description: 'Service key: a service name or `*` for shared'
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Config key
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigWriteRequest'
        required: true
      responses:
        '200':
          description: Value written
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigWriteResponse'
        '400':
          description: Value failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Config key is not editable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown config key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - admin-config
      operationId: admin_config_delete_value
      parameters:
      - name: service
        in: path
        description: 'Service key: a service name or `*` for shared'
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Config key
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Value reset to default
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigWriteResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown config key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/config/{service}/{key}/audit:
    get:
      tags:
      - admin-config
      operationId: admin_config_get_audit
      parameters:
      - name: service
        in: path
        description: Service key
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Config key
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Audit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigAuditListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/module-registry/snapshot:
    get:
      tags:
      - admin-data
      operationId: admin_data_module_registry_snapshot
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Read-only module registry preflight snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleRegistrySnapshotResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/modules:
    get:
      tags:
      - admin-data
      operationId: admin_data_list_modules
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: All module registry metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleMetadataListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/modules/refresh:
    post:
      tags:
      - admin-data
      operationId: admin_data_refresh_modules
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Module registry metadata snapshot after refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleMetadataListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Module registry refresh is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/schema:
    get:
      tags:
      - admin-data
      operationId: admin_data_list_schemas
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: All admin-capable modules' schemas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchemaListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/schema/refresh:
    post:
      tags:
      - admin-data
      operationId: admin_data_refresh_schemas
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Refreshed admin-capable modules' schemas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchemaRefreshResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Admin module refresh is unavailable or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/{module}/actions/{action}:
    post:
      tags:
      - admin-data
      operationId: admin_data_invoke_action
      parameters:
      - name: module
        in: path
        description: Module name, e.g. remote-crm
        required: true
        schema:
          type: string
      - name: action
        in: path
        description: Declared admin action name
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionInvokeRequest'
        required: true
      responses:
        '200':
          description: Action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionInvokeResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown module or undeclared action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Action source is unavailable or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/{module}/{entity}:
    get:
      tags:
      - admin-data
      operationId: admin_data_list_records
      parameters:
      - name: module
        in: path
        description: Module name, e.g. identity
        required: true
        schema:
          type: string
      - name: entity
        in: path
        description: Entity name, e.g. users
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Max records (default 50, max 200)
        required: false
        schema:
          type: integer
          format: int64
      - name: cursor
        in: query
        description: Opaque pagination cursor
        required: false
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: A page of records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDataListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown module or entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/{module}/{entity}/{id}:
    get:
      tags:
      - admin-data
      operationId: admin_data_get_record
      parameters:
      - name: module
        in: path
        description: Module name
        required: true
        schema:
          type: string
      - name: entity
        in: path
        description: Entity name
        required: true
        schema:
          type: string
      - name: id
        in: path
        description: Record id
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: One record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDataDetailResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown module/entity or record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/runtime/admin-actions:
    get:
      tags:
      - admin-runtime
      operationId: admin_runtime_list_admin_action_invocations
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token, for example `Bearer dev-service:admin`
        required: true
        schema:
          type: string
      - name: x-request-id
        in: header
        description: Optional caller-provided request identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: x-correlation-id
        in: header
        description: Optional caller-provided correlation identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: module_name
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: action_name
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: capability
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: correlation_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: success
        in: query
        required: false
        schema:
          type:
          - boolean
          - 'null'
      - name: limit
        in: query
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      - name: created_before
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
          format: date-time
      responses:
        '200':
          description: Recent declarative admin action invocations
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Correlation identifier shared across related work
            x-request-id:
              schema:
                type: string
              description: Request identifier for this HTTP request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionInvocationListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/runtime/executions/{node_id}/logs:
    get:
      tags:
      - admin-runtime
      operationId: admin_runtime_get_execution_logs
      parameters:
      - name: node_id
        in: path
        description: Runtime execution node identifier
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token, for example `Bearer dev-service:admin`
        required: true
        schema:
          type: string
      - name: x-request-id
        in: header
        description: Optional caller-provided request identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: x-correlation-id
        in: header
        description: Optional caller-provided correlation identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: created_before
        in: query
        required: false
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Structured logs recorded for the runtime execution node
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Correlation identifier shared across related work
            x-request-id:
              schema:
                type: string
              description: Request identifier for this HTTP request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRuntimeExecutionLogListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Runtime execution node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/runtime/executions/{node_id}/payload:
    get:
      tags:
      - admin-runtime
      operationId: admin_runtime_get_execution_payload
      parameters:
      - name: node_id
        in: path
        description: Runtime execution node identifier
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token, for example `Bearer dev-service:admin`
        required: true
        schema:
          type: string
      - name: x-request-id
        in: header
        description: Optional caller-provided request identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: x-correlation-id
        in: header
        description: Optional caller-provided correlation identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Redacted payload captured for the runtime execution node
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Correlation identifier shared across related work
            x-request-id:
              schema:
                type: string
              description: Request identifier for this HTTP request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRuntimeExecutionPayloadResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Runtime execution node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/runtime/executions/{node_id}/technical-operations:
    get:
      tags:
      - admin-runtime
      operationId: admin_runtime_get_execution_technical_operations
      parameters:
      - name: node_id
        in: path
        description: Runtime execution node identifier
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token, for example `Bearer dev-service:admin`
        required: true
        schema:
          type: string
      - name: x-request-id
        in: header
        description: Optional caller-provided request identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: x-correlation-id
        in: header
        description: Optional caller-provided correlation identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Technical operations observed for the runtime execution node
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Correlation identifier shared across related work
            x-request-id:
              schema:
                type: string
              description: Request identifier for this HTTP request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRuntimeTechnicalOperationListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Runtime execution node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/runtime/functions:
    get:
      tags:
      - admin-runtime
      operationId: admin_runtime_list_function_runs
      parameters:
      - name: authorization
        in: header
        description: Development service bearer token, for example `Bearer dev-service:admin`
        required: true
        schema:
          type: string
      - name: x-request-id
        in: header
        description: Optional caller-provided request identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: x-correlation-id
        in: header
        description: Optional caller-provided correlation identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: status
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: function_name
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: limit
        in: query
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      - name: created_before
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
          format: date-time
      responses:
        '200':
          description: Runtime function runs
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Correlation identifier shared across related work
            x-request-id:
              schema:
                type: string
              description: Request identifier for this HTTP request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFunctionRunListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/runtime/functions/{id}:
    get:
      tags:
      - admin-runtime
      operationId: admin_runtime_get_function_run
      parameters:
      - name: id
        in: path
        description: Runtime function run identifier
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token, for example `Bearer dev-service:admin`
        required: true
        schema:
          type: string
      - name: x-request-id
        in: header
        description: Optional caller-provided request identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: x-correlation-id
        in: header
        description: Optional caller-provided correlation identifier
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Runtime function run
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Correlation identifier shared across related work
            x-request-id:
              schema:
                type: string
              description: Request identifier for this HTTP request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFunctionRunResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Function run was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
