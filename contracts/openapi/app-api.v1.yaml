          description: Ordered field descriptors driving list columns / detail rows.
        label:
          type: string
          description: Human label for the console, e.g. "Users".
        name:
          type: string
          description: Stable entity key, unique within the module, e.g. "users".
        read_capability:
          type: string
          description: |-
            Capability required to read this entity. Declared now; gated only
            coarsely (AdminActor) this step. Fine-grained RBAC is a later spec.
    ErrorBody:
      type: object
      required:
      - code
      - message
      - details
      properties:
        code:
          type: string
        correlation_id:
          type:
          - string
          - 'null'
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'
        message:
          type: string
        request_id:
          type:
          - string
          - 'null'
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    FieldSchema:
      type: object
      description: One field of an entity.
      required:
      - name
      - label
      - field_type
      properties:
        field_type:
          $ref: '#/components/schemas/FieldType'
          description: Rendering hint for the console's display layer.
        label:
          type: string
          description: Human label, e.g. "Email".
        name:
          type: string
          description: Key in the record's JSON object, e.g. "email".
        nullable:
          type: boolean
          description: Whether the value may be null/absent.
    FieldType:
      oneOf:
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - string
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - integer
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - boolean
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - timestamp
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - json
      description: Minimal field-type vocabulary. `Json` is the catch-all so any field renders.
    LifecycleActivationJobDeclaration:
      type: object
      required:
      - name
      - function_name
      properties:
        function_name:
          type: string
        input: {}
        name:
          type: string
        required:
          type: boolean
        run_policy:
          $ref: '#/components/schemas/LifecycleActivationRunPolicy'
    LifecycleActivationRunPolicy:
      type: string
      enum:
      - every_startup
    LifecycleStartupCheckDeclaration:
      allOf:
      - $ref: '#/components/schemas/LifecycleStartupCheckKind'
      - type: object
        required:
        - name
        properties:
          name:
            type: string
          required:
            type: boolean
    LifecycleStartupCheckKind:
      oneOf:
      - type: object
        required:
        - function_name
        - kind
        properties:
          function_name:
            type: string
          kind:
            type: string
            enum:
            - function_registered
      - type: object
        required:
        - capability
        - kind
        properties:
          capability:
            type: string
          kind:
            type: string
            enum:
            - capability_declared
    LifecycleSurface:
      type: object
      properties:
        activation_jobs:
          type: array
          items:
            $ref: '#/components/schemas/LifecycleActivationJobDeclaration'
        startup_checks:
          type: array
          items:
            $ref: '#/components/schemas/LifecycleStartupCheckDeclaration'
    MeResponse:
      type: object
      required:
      - user_id
      - scopes
      properties:
        scopes:
          type: array
          items:
            type: string
        user_id:
          type: string
    MeResponseEnvelope:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/MeResponse'
    ModuleHttpMethod:
      type: string
      enum:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
    ModuleHttpRoute:
      type: object
      required:
      - method
      - path
      properties:
        capability:
          type:
          - string
          - 'null'
          description: |-
            Optional capability required before a future host proxy exposes this
            route. No enforcement exists until the proxy protocol is implemented.
        display_name:
          type:
          - string
          - 'null'
          description: Compact label used when this route appears as a runtime story node.
        method:
          $ref: '#/components/schemas/ModuleHttpMethod'
        path:
          type: string
          description: Module-local path, e.g. `/contacts` or `/contacts/{id}`.
        story_title:
          type:
          - string
          - 'null'
          description: Optional story title for direct requests to this route.
    ModuleManifestLint:
      type: object
      required:
      - severity
      - subject
      - message
      - suggestion
      properties:
        message:
          type: string
        severity:
          $ref: '#/components/schemas/ModuleManifestLintSeverity'
        subject:
          type: string
        suggestion:
          type: string
    ModuleManifestLintSeverity:
      type: string
      enum:
      - ok
      - warning
      - error
    ModuleSource:
      type: string
      enum:
      - linked
      - remote
    PageInfo:
      type: object
      required:
      - limit
      properties:
        limit:
          type: integer
          format: int64
        next_created_before:
          type:
          - string
          - 'null'
          format: date-time
    RemoteHttpProxyResponse:
      type: object
      required:
      - status
      - module_name
      - method
      - declared_path
      - remote_path
      - capability
      - path_params
      - data
      properties:
        capability:
          type: string
        data: {}
        declared_path:
          type: string
        method:
          $ref: '#/components/schemas/ModuleHttpMethod'
        module_name:
          type: string
        path_params:
          type: object
          additionalProperties:
            type: string
          propertyNames:
            type: string
        remote_path:
          type: string
        status:
          $ref: '#/components/schemas/RemoteHttpProxyStatus'
    RemoteHttpProxyStatus:
      type: string
      enum:
      - forwarded
    RuntimeFunctionDeclaration:
      type: object
      required:
      - name
      - version
      - queue
      properties:
        input_schema:
          type:
          - string
          - 'null'
          description: Optional schema identifier for the function input payload.
        name:
          type: string
          description: Stable function name used by `runtime.function_runs`.
        queue:
          type: string
          description: Queue name the host should use when registering the function.
        retry_policy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/RuntimeRetryPolicyDeclaration'
            description: |-
              Optional retry policy requested by the module. The host still owns
              enforcement and may clamp values when behavior registration is added.
        version:
          type: integer
          format: int32
          description: Version for the declared function contract.
          minimum: 0
    RuntimeRetryPolicyDeclaration:
      type: object
      required:
      - max_attempts
      - initial_delay_ms
      properties:
        initial_delay_ms:
          type: integer
          format: int64
          minimum: 0
        max_attempts:
          type: integer
          format: int32
          minimum: 0
    RuntimeSurface:
      type: object
      properties:
        functions:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeFunctionDeclaration'
    StoryDisplayDescriptorDto:
      type: object
      required:
      - source
      - display_name
      properties:
        display_name:
          type: string
        source:
          $ref: '#/components/schemas/StoryDisplaySourceDto'
        story_title:
          type:
          - string
          - 'null'
    StoryDisplaySourceDto:
      oneOf:
      - type: object
        required:
        - name
        - kind
        properties:
          kind:
            type: string
            enum:
            - execution_name
          name:
            type: string
      - type: object
        required:
        - method
        - path
        - kind
        properties:
          kind:
            type: string
            enum:
            - http_request
          method:
            type: string
          path:
            type: string
    ValidationErrorDetail:
      type: object
      required:
      - reason
      properties:
        field:
          type:
          - string
          - 'null'
        reason:
          type: string
tags:
- name: identity
  description: Identity module fixture APIs
- name: admin-runtime
  description: Read-only runtime console APIs
- name: admin-config
  description: Editable configuration console APIs
- name: admin-data
  description: Schema-driven admin data console APIs
