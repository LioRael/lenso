components:
  schemas:
    AdminFunctionRun:
      type: object
      required:
      - id
      - function_name
      - status
      - attempts
      - max_attempts
      - available_at
      - correlation_id
      - created_at
      properties:
        attempts:
          type: integer
          format: int32
        available_at:
          type: string
          format: date-time
        completed_at:
          type:
          - string
          - 'null'
          format: date-time
        correlation_id:
          type: string
        created_at:
          type: string
          format: date-time
        function_name:
          type: string
        id:
          type: string
        last_error:
          type:
          - string
          - 'null'
        locked_by:
