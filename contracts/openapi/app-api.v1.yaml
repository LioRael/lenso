        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/{module}/actions/{action}:
    post:
      tags:
      - admin-data
      operationId: admin_data_invoke_action
      parameters:
      - name: module
        in: path
        description: Module name, e.g. remote-crm
        required: true
        schema:
          type: string
      - name: action
        in: path
        description: Declared admin action name
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionInvokeRequest'
        required: true
      responses:
        '200':
          description: Action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionInvokeResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown module or undeclared action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Action source is unavailable or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/{module}/queries/{query}:
    get:
      tags:
      - admin-data
      operationId: admin_data_query_value
      parameters:
      - name: module
        in: path
        description: Module name, e.g. remote-crm
        required: true
        schema:
          type: string
      - name: query
        in: path
        description: Declared admin query name
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQueryResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown module or undeclared query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Query source is unavailable or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/{module}/{entity}:
    get:
      tags:
      - admin-data
      operationId: admin_data_list_records
      parameters:
      - name: module
        in: path
        description: Module name, e.g. identity
        required: true
        schema:
          type: string
      - name: entity
        in: path
        description: Entity name, e.g. users
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Max records (default 50, max 200)
        required: false
        schema:
          type: integer
          format: int64
      - name: cursor
        in: query
        description: Opaque pagination cursor
        required: false
        schema:
          type: string
      - name: authorization
        in: header
        description: Development service bearer token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: A page of records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDataListResponse'
        '401':
          description: Authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown module or entity
          content:
            application/json:
              schema:
