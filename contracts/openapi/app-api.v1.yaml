components:
  schemas:
    ActiveDegradedMode:
      type: object
      required:
      - dependencyId
      - mode
      - evidenceReferences
      properties:
        dependencyId:
          type: string
        evidenceReferences:
          type: array
          items:
            type: string
        mode:
          type: string
    AdminAction:
      type: object
      required:
      - name
      - label
      - capability
      properties:
        capability:
          type: string
        confirmation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AdminActionConfirmation'
        danger_level:
          $ref: '#/components/schemas/AdminActionDangerLevel'
        input_schema:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AdminActionInputSchema'
        label:
          type: string
        name:
          type: string
        operation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ServiceOperationMetadata'
    AdminActionConfirmation:
      type: object
      required:
      - message
      properties:
        message:
          type: string
        required_phrase:
          type:
          - string
          - 'null'
    AdminActionDangerLevel:
      type: string
      enum:
      - low
      - medium
      - high
    AdminActionInputField:
      type: object
      required:
      - name
      - label
      - field_type
      properties:
        description:
          type:
          - string
          - 'null'
        field_type:
          $ref: '#/components/schemas/FieldType'
        label:
          type: string
        name:
          type: string
        required:
          type: boolean
    AdminActionInputSchema:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/AdminActionInputField'
    AdminActionInvocationDto:
      type: object
      required:
      - request_id
      - correlation_id
      - story_node_id
      properties:
        correlation_id:
          type: string
        request_id:
          type: string
        story_node_id:
          type: string
    AdminActionInvocationItem:
      type: object
      required:
      - id
      - module_name
      - action_name
      - label
      - duration_ms
      - success
      - correlation_id
      - occurred_at
      properties:
        action_name:
          type: string
        capability:
          type:
          - string
          - 'null'
        correlation_id:
          type: string
        duration_ms:
          type: integer
          format: int64
        error_code:
          type:
          - string
          - 'null'
        error_message:
          type:
          - string
          - 'null'
        id:
          type: string
        input_summary:
          type:
          - string
          - 'null'
        label:
          type: string
        module_name:
          type: string
        occurred_at:
          type: string
          format: date-time
        request_id:
          type:
          - string
          - 'null'
        result_summary:
          type:
          - string
          - 'null'
        span_id:
          type:
          - string
          - 'null'
        success:
          type: boolean
        trace_id:
          type:
          - string
          - 'null'
    AdminActionInvocationListResponse:
      type: object
      required:
      - data
      - page
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminActionInvocationItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    AdminActionInvokeRequest:
      type: object
      description: Request body for `POST /admin/data/{module}/actions/{action}`.
      properties:
        confirmation_phrase:
          type:
          - string
          - 'null'
        input: {}
    AdminActionInvokeResponse:
      type: object
      description: Response for `POST /admin/data/{module}/actions/{action}`.
      required:
      - data
      - invocation
      properties:
        data: {}
        invocation:
          $ref: '#/components/schemas/AdminActionInvocationDto'
    AdminCapabilityIssueDto:
      type: object
      required:
      - capability
      - subject
      - message
      - suggestion
      properties:
        capability:
          type: string
        message:
          type: string
        subject:
          type: string
        suggestion:
          type: string
    AdminCapabilitySummaryDto:
      type: object
      required:
      - declared_count
      - referenced_count
      - missing_count
      - unused_count
      properties:
        declared_count:
          type: integer
          minimum: 0
        missing_count:
          type: integer
          minimum: 0
        referenced_count:
          type: integer
          minimum: 0
        unused_count:
          type: integer
          minimum: 0
    AdminContextActor:
      oneOf:
      - type: object
        required:
        - service_id
        - kind
        properties:
          kind:
            type: string
            enum:
            - service
          service_id:
            type: string
      - type: object
        required:
        - user_id
        - kind
        properties:
          kind:
            type: string
            enum:
            - user
          user_id:
            type: string
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - system
    AdminContextResponse:
      type: object
      required:
      - actor
      - scopes
      - capabilities
      properties:
        actor:
          $ref: '#/components/schemas/AdminContextActor'
        capabilities:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
    AdminContractCompatibilityReasonDto:
      type: object
      required:
      - code
      - path
      - message
      - nextAction
      properties:
        code:
          type: string
        message:
          type: string
        nextAction:
          type: string
        path:
          type: string
    AdminContractCompatibilityResultDto:
      type: object
      required:
      - category
      - contractKind
      - contractId
      - changedVersion
      - affectedReferences
      - reasons
      properties:
        affectedReferences:
          type: array
          items:
            type: string
        category:
          type: string
        changedVersion:
          type: string
        contractId:
          type: string
        contractKind:
          type: string
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/AdminContractCompatibilityReasonDto'
    AdminDataDetailResponse:
      type: object
      description: Response for `GET /admin/data/{module}/{entity}/{id}`.
      required:
      - data
      properties:
        data: {}
    AdminDataListResponse:
      type: object
      description: 'Response for `GET /admin/data/{module}/{entity}`: a page of records.'
      required:
      - data
      - page
      properties:
        data:
          type: array
          items: {}
          description: Each record is an arbitrary JSON object whose keys match the entity schema.
        page:
          $ref: '#/components/schemas/AdminDataPageInfo'
    AdminDataPageInfo:
      type: object
      description: |-
        Pagination info. `next_cursor` is an opaque token (not a timestamp like
        platform-admin's PageInfo) so it makes no assumption about entity shape.
      required:
      - limit
      properties:
        limit:
          type: integer
          format: int64
        next_cursor:
          type:
          - string
          - 'null'
    AdminDeclarativeComponent:
      oneOf:
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - metric_strip
          metrics:
            type: array
            items:
              $ref: '#/components/schemas/AdminMetricBinding'
      - type: object
        required:
        - query
        - capability
        - value_path
