components:
  schemas:
    AdminAction:
      type: object
      required:
      - name
      - label
      - capability
      properties:
        capability:
          type: string
        confirmation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AdminActionConfirmation'
        danger_level:
          $ref: '#/components/schemas/AdminActionDangerLevel'
        input_schema:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AdminActionInputSchema'
        label:
          type: string
        name:
          type: string
        operation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ServiceOperationMetadata'
    AdminActionConfirmation:
      type: object
      required:
      - message
      properties:
        message:
          type: string
        required_phrase:
          type:
          - string
          - 'null'
    AdminActionDangerLevel:
      type: string
      enum:
      - low
      - medium
      - high
    AdminActionInputField:
      type: object
      required:
      - name
      - label
      - field_type
      properties:
        description:
          type:
          - string
          - 'null'
        field_type:
          $ref: '#/components/schemas/FieldType'
        label:
          type: string
        name:
          type: string
        required:
          type: boolean
    AdminActionInputSchema:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/AdminActionInputField'
    AdminActionInvocationDto:
      type: object
      required:
      - request_id
      - correlation_id
      - story_node_id
      properties:
        correlation_id:
          type: string
        request_id:
          type: string
        story_node_id:
          type: string
    AdminActionInvocationItem:
      type: object
      required:
      - id
      - module_name
      - action_name
      - label
      - duration_ms
      - success
      - correlation_id
      - occurred_at
      properties:
        action_name:
          type: string
        capability:
          type:
          - string
          - 'null'
        correlation_id:
          type: string
        duration_ms:
          type: integer
          format: int64
        error_code:
          type:
          - string
          - 'null'
        error_message:
          type:
          - string
          - 'null'
        id:
          type: string
        input_summary:
          type:
          - string
          - 'null'
        label:
          type: string
        module_name:
          type: string
        occurred_at:
          type: string
          format: date-time
        request_id:
          type:
          - string
          - 'null'
        result_summary:
          type:
          - string
          - 'null'
        span_id:
          type:
          - string
          - 'null'
        success:
          type: boolean
        trace_id:
          type:
          - string
          - 'null'
    AdminActionInvocationListResponse:
      type: object
      required:
      - data
      - page
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminActionInvocationItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    AdminActionInvokeRequest:
      type: object
      description: Request body for `POST /admin/data/{module}/actions/{action}`.
