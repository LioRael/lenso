            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/service-system/runbooks:
