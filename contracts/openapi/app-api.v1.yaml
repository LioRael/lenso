        '403':
          description: Service or system authentication is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/data/launchpad/doctor:
    get:
      tags:
      - admin-data
      operationId: admin_data_launchpad_doctor
      parameters:
      - name: authorization
