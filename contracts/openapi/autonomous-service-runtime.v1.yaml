openapi: 3.1.0
info:
  title: Lenso Autonomous Service Runtime API
  description: Service-owned health and local Story Segment surfaces
  license:
    name: MIT
    identifier: MIT
  version: 1.0.0
paths:
  /health/live:
    get:
      tags:
      - service-runtime
      operationId: liveness
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /health/ready:
    get:
      tags:
      - service-runtime
      operationId: readiness
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /health/startup:
    get:
      tags:
      - service-runtime
      operationId: startup
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /runtime/event-deliveries:
    get:
      tags:
      - service-runtime
      operationId: event_delivery_evidence
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceEventEvidence'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/story-segments:
    get:
      tags:
      - service-runtime
      operationId: story_segments
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorySegment'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/instances/{instance_id}:
    get:
      tags:
      - service-runtime
      operationId: inspect_workflow
      parameters:
      - name: instance_id
        in: path
        description: Stable Workflow Instance identity
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowInspectionResult'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/{owner}/{name}/instances:
    post:
      tags:
      - service-runtime
      operationId: start_workflow
      parameters:
      - name: owner
        in: path
        description: Owning Module identity
        required: true
        schema:
          type: string
      - name: name
        in: path
        description: Stable Workflow Definition name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowStartRequest'
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStartResult'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - code
      - errors
      properties:
        code:
          type: string
        correlation_id:
          type:
          - string
          - 'null'
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ProblemErrorDetail'
        next_actions:
          type:
          - array
          - 'null'
          items:
            type: string
        request_id:
          type:
          - string
          - 'null'
        status:
          type: integer
          format: int32
          maximum: 599
          minimum: 100
        title:
          type: string
        type:
          type: string
    ProblemErrorDetail:
      type: object
      required:
      - reason
      properties:
        field:
          type:
          - string
          - 'null'
        reason:
          type: string
    RuntimeHealth:
      type: object
      required:
      - serviceId
      - workloadId
      - storeId
      - migrationWorkloadId
      - workerWorkloadId
      - phase
      - workerPhase
      properties:
        migrationWorkloadId:
          type: string
        phase:
          $ref: '#/components/schemas/RuntimePhase'
        serviceId:
          type: string
        storeId:
          type: string
        workerPhase:
          $ref: '#/components/schemas/RuntimePhase'
        workerWorkloadId:
          type: string
        workloadId:
          type: string
    RuntimePhase:
      type: string
      enum:
      - starting
      - ready
      - stopping
      - stopped
      - failed
    ServiceEventEvidence:
      type: object
      required:
      - evidenceId
      - stage
      - outcome
      - eventId
      - detail
      - recordedAt
      properties:
        deliveryId:
          type:
          - string
          - 'null'
        detail: {}
        eventId:
          type: string
        evidenceId:
          type: string
        outcome:
          type: string
        recordedAt:
          type: string
          format: date-time
        stage:
          type: string
    StorySegment:
      type: object
      required:
      - segmentId
      - serviceId
      - workloadId
      - operation
      - status
      - startedAt
      - completedAt
      properties:
        completedAt:
          type: string
          format: date-time
        operation:
          type: string
        segmentId:
          type: string
        serviceId:
          type: string
        startedAt:
          type: string
          format: date-time
        status:
          type: string
        workloadId:
          type: string
    WorkflowChildInspection:
      type: object
      required:
      - linkId
      - startId
      - definition
      - state
      - nextActions
      - createdAt
      - updatedAt
      properties:
        completionDeliveryId:
          type:
          - string
          - 'null'
        createdAt:
          type: string
          format: date-time
        definition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        failure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowFailureEvidence'
        instanceId:
          type:
          - string
          - 'null'
        linkId:
          type: string
        nextActions:
          type: array
          items:
            type: string
        startId:
          type: string
        state:
          $ref: '#/components/schemas/WorkflowChildState'
        updatedAt:
          type: string
          format: date-time
    WorkflowChildState:
      type: string
      enum:
      - waiting
      - completed
      - failed
      - unsupported_version
    WorkflowDefinitionIdentity:
      type: object
      required:
      - owner
      - name
      - version
      properties:
        name:
          type: string
        owner:
          type: string
        version:
          type: string
    WorkflowFailureEvidence:
      type: object
      required:
      - code
      - message
      - nextAction
      properties:
        code:
          type: string
        message:
          type: string
        nextAction:
          type: string
      additionalProperties: false
    WorkflowInspectionResult:
      type: object
      required:
      - protocol
      - instance
      - nextActions
      properties:
        instance:
          $ref: '#/components/schemas/WorkflowInstance'
        nextActions:
          type: array
          items:
            type: string
        protocol:
          type: string
    WorkflowInstance:
      type: object
      required:
      - instanceId
      - serviceId
      - definition
      - state
      - input
      - storyContext
      - initialStepId
      - steps
      - createdAt
      - updatedAt
      properties:
        createdAt:
          type: string
          format: date-time
        definition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        failure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowFailureEvidence'
        initialStepId:
          type: string
        input: {}
        instanceId:
          type: string
        parent:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowParentInspection'
        result: {}
        serviceId:
          type: string
        state:
          $ref: '#/components/schemas/WorkflowInstanceState'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepInspection'
        storyContext:
          $ref: '#/components/schemas/WorkflowStoryContext'
        tenantScope:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowTenantScope'
        updatedAt:
          type: string
          format: date-time
    WorkflowInstanceState:
      type: string
      enum:
      - running
      - completed
      - failed
    WorkflowOutgoingWorkInspection:
      type: object
      required:
      - kind
      - consumerId
      - eventId
      - contractId
      - contractVersion
      properties:
        consumerId:
          type: string
        contractId:
          type: string
        contractVersion:
          type: string
        eventId:
          type: string
        kind:
          type: string
      additionalProperties: false
    WorkflowParentInspection:
      type: object
      required:
      - instanceId
      - stepId
      - causationId
      properties:
        causationId:
          type: string
        instanceId:
          type: string
        stepId:
          type: string
    WorkflowStartRequest:
      type: object
      required:
      - definitionVersion
      - input
      - storyContext
      properties:
        definitionVersion:
          type: string
        input: {}
        storyContext:
          $ref: '#/components/schemas/WorkflowStoryContext'
        tenantScope:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowTenantScope'
      additionalProperties: false
    WorkflowStartResult:
      type: object
      required:
      - protocol
      - instance
      - nextActions
      properties:
        instance:
          $ref: '#/components/schemas/WorkflowInstance'
        nextActions:
          type: array
          items:
            type: string
        protocol:
          type: string
    WorkflowStepInspection:
      type: object
      required:
      - stepId
      - definitionStepName
      - position
      - state
      - createdAt
      - updatedAt
      properties:
        childWorkflow:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowChildInspection'
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        definitionStepName:
          type: string
        outgoingWork:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowOutgoingWorkInspection'
        position:
          type: integer
          format: int32
          minimum: 0
        state:
          $ref: '#/components/schemas/WorkflowStepState'
        stepId:
          type: string
        transitionId:
          type:
          - string
          - 'null'
        updatedAt:
          type: string
          format: date-time
    WorkflowStepState:
      type: string
      enum:
      - pending
      - waiting_for_child
      - completed
      - failed
    WorkflowStoryContext:
      type: object
      required:
      - storyId
      - segmentId
      properties:
        segmentId:
          type: string
        storyId:
          type: string
      additionalProperties: false
    WorkflowTenantScope:
      type: object
      required:
      - tenantId
      properties:
        tenantId:
          type: string
      additionalProperties: false
