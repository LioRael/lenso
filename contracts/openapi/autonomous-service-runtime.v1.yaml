openapi: 3.1.0
info:
  title: Lenso Autonomous Service Runtime API
  description: Service-owned health and local Story Segment surfaces
  license:
    name: MIT
    identifier: MIT
  version: 1.0.0
paths:
  /health/live:
    get:
      tags:
      - service-runtime
      operationId: liveness
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /health/ready:
    get:
      tags:
      - service-runtime
      operationId: readiness
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /health/startup:
    get:
      tags:
      - service-runtime
      operationId: startup
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /runtime/event-deliveries:
    get:
      tags:
      - service-runtime
      operationId: event_delivery_evidence
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceEventEvidence'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/story-segments:
    get:
      tags:
      - service-runtime
      operationId: story_segments
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorySegment'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/definitions/compatibility:
    post:
      tags:
      - service-runtime
      operationId: check_workflow_compatibility
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCompatibilityRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowCompatibilityResult'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/instances/{instance_id}:
    get:
      tags:
      - service-runtime
      operationId: inspect_workflow
      parameters:
      - name: instance_id
        in: path
        description: Stable Workflow Instance identity
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowInspectionResult'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/{owner}/{name}/instances:
    post:
      tags:
      - service-runtime
      operationId: start_workflow
      parameters:
      - name: owner
        in: path
        description: Owning Module identity
        required: true
        schema:
          type: string
      - name: name
        in: path
        description: Stable Workflow Definition name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowStartRequest'
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStartResult'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/{owner}/{name}/migration-plans/dry-run:
    post:
      tags:
      - service-runtime
      operationId: dry_run_workflow_migration
      parameters:
      - name: owner
        in: path
        description: Owning Module identity
        required: true
        schema:
          type: string
      - name: name
        in: path
        description: Stable Workflow Definition name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowMigrationDryRunRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowMigrationDryRunPlan'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - code
      - errors
      properties:
        code:
          type: string
        correlation_id:
          type:
          - string
          - 'null'
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ProblemErrorDetail'
        next_actions:
          type:
          - array
          - 'null'
          items:
            type: string
        request_id:
          type:
          - string
          - 'null'
        status:
          type: integer
          format: int32
          maximum: 599
          minimum: 100
        title:
          type: string
        type:
          type: string
    ProblemErrorDetail:
      type: object
      required:
      - reason
      properties:
        field:
          type:
          - string
          - 'null'
        reason:
          type: string
    RuntimeHealth:
      type: object
      required:
      - serviceId
      - workloadId
      - storeId
      - migrationWorkloadId
      - workerWorkloadId
      - phase
      - workerPhase
      properties:
        migrationWorkloadId:
          type: string
        phase:
          $ref: '#/components/schemas/RuntimePhase'
        serviceId:
          type: string
        storeId:
          type: string
        workerPhase:
          $ref: '#/components/schemas/RuntimePhase'
        workerWorkloadId:
          type: string
        workloadId:
          type: string
    RuntimePhase:
      type: string
      enum:
      - starting
      - ready
      - stopping
      - stopped
      - failed
    ServiceEventEvidence:
      type: object
      required:
      - evidenceId
      - stage
      - outcome
      - eventId
      - detail
      - recordedAt
      properties:
        deliveryId:
          type:
          - string
          - 'null'
        detail: {}
        eventId:
          type: string
        evidenceId:
          type: string
        outcome:
          type: string
        recordedAt:
          type: string
          format: date-time
        stage:
          type: string
    StorySegment:
      type: object
      required:
      - segmentId
      - serviceId
      - workloadId
      - operation
      - status
      - startedAt
      - completedAt
      properties:
        completedAt:
          type: string
          format: date-time
        operation:
          type: string
        segmentId:
          type: string
        serviceId:
          type: string
        startedAt:
          type: string
          format: date-time
        status:
          type: string
        workloadId:
          type: string
    WorkflowChildInspection:
      type: object
      required:
      - linkId
      - startId
      - definition
      - state
      - nextActions
      - createdAt
      - updatedAt
      properties:
        completionDeliveryId:
          type:
          - string
          - 'null'
        createdAt:
          type: string
          format: date-time
        definition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        failure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowFailureEvidence'
        instanceId:
          type:
          - string
          - 'null'
        linkId:
          type: string
        nextActions:
          type: array
          items:
            type: string
        startId:
          type: string
        state:
          $ref: '#/components/schemas/WorkflowChildState'
        updatedAt:
          type: string
          format: date-time
    WorkflowChildState:
      type: string
      enum:
      - waiting
      - completed
      - failed
      - unsupported_version
    WorkflowCompatibilityCategory:
      type: string
      enum:
      - safe
      - needs-attention
      - breaking
      - blocked
    WorkflowCompatibilityReason:
      type: object
      required:
      - code
      - path
      - message
      - nextAction
      properties:
        code:
          type: string
        message:
          type: string
        nextAction:
          type: string
        path:
          type: string
      additionalProperties: false
    WorkflowCompatibilityRequest:
      type: object
      required:
      - before
      - after
      properties:
        after:
          $ref: '#/components/schemas/WorkflowDefinition'
        before:
          $ref: '#/components/schemas/WorkflowDefinition'
      additionalProperties: false
    WorkflowCompatibilityResult:
      type: object
      required:
      - protocol
      - category
      - before
      - after
      - reasons
      properties:
        after:
          $ref: '#/components/schemas/WorkflowDefinitionReference'
        before:
          $ref: '#/components/schemas/WorkflowDefinitionReference'
        category:
          $ref: '#/components/schemas/WorkflowCompatibilityCategory'
        protocol:
          type: string
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowCompatibilityReason'
      additionalProperties: false
    WorkflowDataContract:
      type: object
      required:
      - contractId
      - version
      properties:
        contractId:
          type: string
        version:
          type: string
      additionalProperties: false
    WorkflowDefinition:
      type: object
      required:
      - protocol
      - owner
      - name
      - version
      - inputContract
      - resultContract
      - steps
      properties:
        inputContract:
          $ref: '#/components/schemas/WorkflowDataContract'
        name:
          type: string
          description: Stable workflow name within the owning Module.
        owner:
          type: string
          description: Stable Module identity that owns the workflow behavior.
        protocol:
          type: string
          description: Versioned declaration protocol, currently `lenso.workflow-definition.v1`.
        resultContract:
          $ref: '#/components/schemas/WorkflowDataContract'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepDeclaration'
          description: Ordered step metadata. Position in this vector is contract-significant.
        version:
          type: string
          description: Definition version pinned by every started instance.
      additionalProperties: false
    WorkflowDefinitionIdentity:
      type: object
      required:
      - owner
      - name
      - version
      properties:
        name:
          type: string
        owner:
          type: string
        version:
          type: string
    WorkflowDefinitionReference:
      type: object
      required:
      - owner
      - name
      - version
      properties:
        name:
          type: string
        owner:
          type: string
        version:
          type: string
      additionalProperties: false
    WorkflowFailureClassification:
      type: string
      enum:
      - retryable
      - timeout
      - permanent
    WorkflowFailureEvidence:
      type: object
      required:
      - code
      - message
      - nextAction
      properties:
        code:
          type: string
        message:
          type: string
        nextAction:
          type: string
      additionalProperties: false
    WorkflowInspectionResult:
      type: object
      required:
      - protocol
      - instance
      - nextActions
      properties:
        instance:
          $ref: '#/components/schemas/WorkflowInstance'
        nextActions:
          type: array
          items:
            type: string
        protocol:
          type: string
    WorkflowInstance:
      type: object
      required:
      - instanceId
      - serviceId
      - definition
      - state
      - input
      - storyContext
      - initialStepId
      - steps
      - createdAt
      - updatedAt
      properties:
        createdAt:
          type: string
          format: date-time
        definition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        failure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowFailureEvidence'
        initialStepId:
          type: string
        input: {}
        instanceId:
          type: string
        parent:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowParentInspection'
        result: {}
        serviceId:
          type: string
        state:
          $ref: '#/components/schemas/WorkflowInstanceState'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepInspection'
        storyContext:
          $ref: '#/components/schemas/WorkflowStoryContext'
        tenantScope:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowTenantScope'
        updatedAt:
          type: string
          format: date-time
    WorkflowInstanceState:
      type: string
      enum:
      - running
      - completed
      - failed
    WorkflowMigrationAffectedInstance:
      type: object
      required:
      - instanceId
      - state
      - steps
      properties:
        definitionDigest:
          type:
          - string
          - 'null'
        instanceId:
          type: string
        state:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowMigrationAffectedStep'
    WorkflowMigrationAffectedStep:
      type: object
      required:
      - name
      - position
      - state
      properties:
        name:
          type: string
        position:
          type: integer
          format: int32
          minimum: 0
        state:
          type: string
    WorkflowMigrationApprovalBoundary:
      type: string
      enum:
      - in_flight_workflow_migration
    WorkflowMigrationDryRunPlan:
      type: object
      required:
      - protocol
      - planId
      - mutatesState
      - serviceId
      - sourceDefinition
      - sourceDefinitionDigest
      - targetDefinition
      - targetDefinitionDigest
      - compatibility
      - affectedInstances
      - stateMapping
      - rollbackConstraints
      - approvalBoundary
      - nextActions
      properties:
        affectedInstances:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowMigrationAffectedInstance'
        approvalBoundary:
          $ref: '#/components/schemas/WorkflowMigrationApprovalBoundary'
        compatibility:
          $ref: '#/components/schemas/WorkflowCompatibilityResult'
        mutatesState:
          type: boolean
        nextActions:
          type: array
          items:
            type: string
        planId:
          type: string
        protocol:
          type: string
        rollbackConstraints:
          type: array
          items:
            type: string
        serviceId:
          type: string
        sourceDefinition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        sourceDefinitionDigest:
          type: string
        stateMapping:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStateMapping'
        targetDefinition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        targetDefinitionDigest:
          type: string
    WorkflowMigrationDryRunRequest:
      type: object
      required:
      - fromVersion
      - targetVersion
      properties:
        fromVersion:
          type: string
        targetVersion:
          type: string
      additionalProperties: false
    WorkflowOutgoingWorkInspection:
      type: object
      required:
      - kind
      - consumerId
      - eventId
      - contractId
      - contractVersion
      properties:
        consumerId:
          type: string
        contractId:
          type: string
        contractVersion:
          type: string
        eventId:
          type: string
        kind:
          type: string
      additionalProperties: false
    WorkflowParentInspection:
      type: object
      required:
      - instanceId
      - stepId
      - causationId
      properties:
        causationId:
          type: string
        instanceId:
          type: string
        stepId:
          type: string
    WorkflowRetryPolicyDeclaration:
      type: object
      required:
      - maxAttempts
      - delaysMs
      properties:
        delaysMs:
          type: array
          items:
            type: integer
            format: int64
            minimum: 0
          description: Delay before attempts 2..N. The length must equal `max_attempts` - 1.
        maxAttempts:
          type: integer
          format: int32
          description: Total attempts including the original execution.
          minimum: 0
      additionalProperties: false
    WorkflowStartRequest:
      type: object
      required:
      - definitionVersion
      - input
      - storyContext
      properties:
        definitionVersion:
          type: string
        input: {}
        storyContext:
          $ref: '#/components/schemas/WorkflowStoryContext'
        tenantScope:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowTenantScope'
      additionalProperties: false
    WorkflowStartResult:
      type: object
      required:
      - protocol
      - instance
      - nextActions
      properties:
        instance:
          $ref: '#/components/schemas/WorkflowInstance'
        nextActions:
          type: array
          items:
            type: string
        protocol:
          type: string
    WorkflowStateMapping:
      type: object
      required:
      - fromStep
      - fromPosition
      - status
      properties:
        fromPosition:
          type: integer
          format: int32
          minimum: 0
        fromStep:
          type: string
        status:
          $ref: '#/components/schemas/WorkflowStateMappingStatus'
        toPosition:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        toStep:
          type:
          - string
          - 'null'
    WorkflowStateMappingStatus:
      type: string
      enum:
      - preserved
      - moved
      - unmapped
    WorkflowStepAttemptInspection:
      type: object
      required:
      - attemptId
      - attemptNumber
      - transitionId
      - state
      - scheduledAt
      - startedAt
      properties:
        attemptId:
          type: string
        attemptNumber:
          type: integer
          format: int32
          minimum: 0
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        failure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowStepFailureInspection'
        scheduledAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        state:
          $ref: '#/components/schemas/WorkflowStepAttemptState'
        transitionId:
          type: string
    WorkflowStepAttemptState:
      type: string
      enum:
      - running
      - failed
      - succeeded
    WorkflowStepDeclaration:
      type: object
      required:
      - name
      properties:
        displayName:
          type:
          - string
          - 'null'
        name:
          type: string
        retryPolicy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowRetryPolicyDeclaration'
            description: |-
              Optional durable retry schedule. `max_attempts` includes the original
              attempt, while each delay schedules the following attempt.
        timeoutMs:
          type:
          - integer
          - 'null'
          format: int64
          description: Optional durable timeout applied independently to every attempt.
          minimum: 0
      additionalProperties: false
    WorkflowStepFailureInspection:
      type: object
      required:
      - classification
      - code
      - message
      properties:
        classification:
          $ref: '#/components/schemas/WorkflowFailureClassification'
        code:
          type: string
        message:
          type: string
    WorkflowStepInspection:
      type: object
      required:
      - stepId
      - definitionStepName
      - position
      - state
      - attemptCount
      - maxAttempts
      - retryScheduleMs
      - attempts
      - timers
      - createdAt
      - updatedAt
      properties:
        attemptCount:
          type: integer
          format: int32
          minimum: 0
        attempts:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepAttemptInspection'
        childWorkflow:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowChildInspection'
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        definitionStepName:
          type: string
        exhaustedAt:
          type:
          - string
          - 'null'
          format: date-time
        latestFailure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowStepFailureInspection'
        maxAttempts:
          type: integer
          format: int32
          minimum: 0
        nextAttemptAt:
          type:
          - string
          - 'null'
          format: date-time
        outgoingWork:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowOutgoingWorkInspection'
        position:
          type: integer
          format: int32
          minimum: 0
        retryScheduleMs:
          type: array
          items:
            type: integer
            format: int64
            minimum: 0
        state:
          $ref: '#/components/schemas/WorkflowStepState'
        stepId:
          type: string
        timers:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTimerInspection'
        transitionId:
          type:
          - string
          - 'null'
        updatedAt:
          type: string
          format: date-time
    WorkflowStepState:
      type: string
      enum:
      - pending
      - waiting_for_child
      - completed
      - exhausted
      - failed
    WorkflowStoryContext:
      type: object
      required:
      - storyId
      - segmentId
      properties:
        segmentId:
          type: string
        storyId:
          type: string
      additionalProperties: false
    WorkflowTenantScope:
      type: object
      required:
      - tenantId
      properties:
        tenantId:
          type: string
      additionalProperties: false
    WorkflowTimerInspection:
      type: object
      required:
      - timerId
      - kind
      - attemptNumber
      - transitionId
      - dueAt
      - state
      properties:
        attemptNumber:
          type: integer
          format: int32
          minimum: 0
        claimedAt:
          type:
          - string
          - 'null'
          format: date-time
        claimedBy:
          type:
          - string
          - 'null'
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        dueAt:
          type: string
          format: date-time
        kind:
          $ref: '#/components/schemas/WorkflowTimerKind'
        state:
          $ref: '#/components/schemas/WorkflowTimerState'
        timerId:
          type: string
        transitionId:
          type: string
    WorkflowTimerKind:
      type: string
      enum:
      - retry
      - step_timeout
    WorkflowTimerState:
      type: string
      enum:
      - pending
      - claimed
      - completed
      - cancelled
