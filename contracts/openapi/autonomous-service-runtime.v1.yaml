openapi: 3.1.0
info:
  title: Lenso Autonomous Service Runtime API
  description: Service-owned health, Reliability Reports, authenticated Story Segment Feed, and Durable Workflow surfaces
  license:
    name: MIT
    identifier: MIT
  version: 1.0.0
paths:
  /health/live:
    get:
      tags:
      - service-runtime
      operationId: liveness
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /health/ready:
    get:
      tags:
      - service-runtime
      operationId: readiness
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /health/startup:
    get:
      tags:
      - service-runtime
      operationId: startup
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealth'
  /runtime/event-deliveries:
    get:
      tags:
      - service-runtime
      operationId: event_delivery_evidence
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceEventEvidence'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/reliability:
    get:
      tags:
      - service-runtime
      operationId: reliability_report
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReliabilityReport'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/story-segments:
    get:
      tags:
      - service-runtime
      operationId: story_segments
      parameters:
      - name: cursor
        in: query
        description: Opaque cursor returned by a prior feed response.
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of entries to return, from 1 through 500.
        required: false
        schema:
          type: integer
          format: int32
          maximum: 500
          minimum: 1
      - name: tenantId
        in: query
        description: Required for tenant-aware Services; omitted reads only unscoped evidence.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorySegmentFeed'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearer_auth: []
  /runtime/workflows/definitions/compatibility:
    post:
      tags:
      - service-runtime
      operationId: check_workflow_compatibility
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCompatibilityRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowCompatibilityResult'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/instances/{instance_id}:
    get:
      tags:
      - service-runtime
      operationId: inspect_workflow
      parameters:
      - name: instance_id
        in: path
        description: Stable Workflow Instance identity
        required: true
        schema:
          type: string
      - name: stepId
        in: query
        description: |-
          Selects one stable step identity for focused attempts, timers, and
          operator-action eligibility.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowInspectionResult'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/instances/{instance_id}/operator-actions/{action}:
    post:
      tags:
      - service-runtime
      operationId: apply_workflow_operator_action_http
      parameters:
      - name: instance_id
        in: path
        description: Stable Workflow Instance identity
        required: true
        schema:
          type: string
      - name: action
        in: path
        description: pause, resume, retry, cancel, terminate, or intervene
        required: true
        schema:
          type: string
      - name: authorization
        in: header
        description: Bearer credential verified by the deployment-owned Workflow authority provider
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowOperatorApplyRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowOperatorResult'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/instances/{instance_id}/operator-actions/{action}/dry-run:
    post:
      tags:
      - service-runtime
      operationId: dry_run_workflow_operator_action
      parameters:
      - name: instance_id
        in: path
        description: Stable Workflow Instance identity
        required: true
        schema:
          type: string
      - name: action
        in: path
        description: pause, resume, retry, cancel, terminate, or intervene
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowOperatorPlanRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowOperatorPlan'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/{owner}/{name}/instances:
    post:
      tags:
      - service-runtime
      operationId: start_workflow
      parameters:
      - name: owner
        in: path
        description: Owning Module identity
        required: true
        schema:
          type: string
      - name: name
        in: path
        description: Stable Workflow Definition name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowStartRequest'
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStartResult'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /runtime/workflows/{owner}/{name}/migration-plans/dry-run:
    post:
      tags:
      - service-runtime
      operationId: dry_run_workflow_migration
      parameters:
      - name: owner
        in: path
        description: Owning Module identity
        required: true
        schema:
          type: string
      - name: name
        in: path
        description: Stable Workflow Definition name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowMigrationDryRunRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowMigrationDryRunPlan'
        '400':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ''
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ActiveDegradedMode:
      type: object
      required:
      - dependencyId
      - mode
      - evidenceReferences
      properties:
        dependencyId:
          type: string
        evidenceReferences:
          type: array
          items:
            type: string
        mode:
          type: string
    EffectiveReliabilityValues:
      type: object
      required:
      - availabilityTargetBasisPoints
      - latencyTargetMs
      - queueBacklogLimit
      - workflowBacklogLimit
      - timerLagLimitMs
      - retryExhaustionLimit
      - compensationPressureLimit
      - errorBudget
      - errorBudgetConsumedLimitBasisPoints
      - readiness
      - liveness
      properties:
        availabilityTargetBasisPoints:
          type: integer
          format: int32
          minimum: 0
        compensationPressureLimit:
          type: integer
          format: int64
          minimum: 0
        errorBudget:
          type: string
        errorBudgetConsumedLimitBasisPoints:
          type: integer
          format: int32
          minimum: 0
        latencyTargetMs:
          type: integer
          format: int64
          minimum: 0
        liveness:
          $ref: '#/components/schemas/ReliabilityLivenessSemantics'
        queueBacklogLimit:
          type: integer
          format: int64
          minimum: 0
        readiness:
          $ref: '#/components/schemas/ReliabilityReadinessSemantics'
        retryExhaustionLimit:
          type: integer
          format: int64
          minimum: 0
        timerLagLimitMs:
          type: integer
          format: int64
          minimum: 0
        workflowBacklogLimit:
          type: integer
          format: int64
          minimum: 0
    ErrorResponse:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - code
      - errors
      properties:
        code:
          type: string
        correlation_id:
          type:
          - string
          - 'null'
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ProblemErrorDetail'
        next_actions:
          type:
          - array
          - 'null'
          items:
            type: string
        request_id:
          type:
          - string
          - 'null'
        status:
          type: integer
          format: int32
          maximum: 599
          minimum: 100
        title:
          type: string
        type:
          type: string
    ProblemErrorDetail:
      type: object
      required:
      - reason
      properties:
        field:
          type:
          - string
          - 'null'
        reason:
          type: string
    ReliabilityCheck:
      type: object
      required:
      - code
      - state
      - observed
      - expected
      properties:
        code:
          type: string
        evidenceReferences:
          type: array
          items:
            type: string
        expected: {}
        issueCode:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReliabilityIssueCode'
        nextActions:
          type: array
          items:
            type: string
        observed: {}
        state:
          $ref: '#/components/schemas/ReliabilityCheckState'
    ReliabilityCheckState:
      type: string
      enum:
      - met
      - breached
      - unknown
      - allowed
    ReliabilityEnforcementBoundary:
      type: object
      required:
      - reportsOnly
      - blocksProductionPromotion
      - executesCanaryPolicy
      - triggersAutomatedRollback
      properties:
        blocksProductionPromotion:
          type: boolean
        executesCanaryPolicy:
          type: boolean
        reportsOnly:
          type: boolean
        triggersAutomatedRollback:
          type: boolean
    ReliabilityHealthResult:
      type: object
      required:
      - healthy
      - semantics
      - issueCodes
      properties:
        healthy:
          type: boolean
        issueCodes:
          type: array
          items:
            $ref: '#/components/schemas/ReliabilityIssueCode'
        semantics:
          type: string
    ReliabilityIssueCode:
      type: string
      enum:
      - service_runtime_unavailable
      - dependency_critical_unavailable
      - dependency_degradable_unavailable
      - dependency_observation_missing
      - queue_backlog_limit_exceeded
      - workflow_backlog_limit_exceeded
      - timer_lag_limit_exceeded
      - retry_exhaustion_limit_exceeded
      - compensation_pressure_limit_exceeded
      - availability_target_breached
      - latency_target_breached
      - error_budget_limit_exceeded
      - reliability_observation_missing
      - reliability_observation_source_unavailable
      - reliability_store_observation_unavailable
    ReliabilityLivenessSemantics:
      type: string
      enum:
      - process_running
      - runtime_operational
    ReliabilityProfile:
      type: string
      enum:
      - development
      - standard
      - critical
    ReliabilityProfileOverrides:
      type: object
      properties:
        compensationPressureLimit:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        errorBudgetConsumedLimitBasisPoints:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        liveness:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReliabilityLivenessSemantics'
        queueBacklogLimit:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        readiness:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReliabilityReadinessSemantics'
        retryExhaustionLimit:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        timerLagLimitMs:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        workflowBacklogLimit:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
      additionalProperties: false
    ReliabilityReadinessSemantics:
      type: string
      enum:
      - serving
      - healthy
    ReliabilityReport:
      type: object
      required:
      - protocol
      - serviceId
      - contractId
      - contractVersion
      - profile
      - effectiveValues
      - state
      - liveness
      - readiness
      - activeDegradedModes
      - checks
      - enforcement
      properties:
        activeDegradedModes:
          type: array
          items:
            $ref: '#/components/schemas/ActiveDegradedMode'
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ReliabilityCheck'
        contractId:
          type: string
        contractVersion:
          type: string
        effectiveValues:
          $ref: '#/components/schemas/EffectiveReliabilityValues'
        enforcement:
          $ref: '#/components/schemas/ReliabilityEnforcementBoundary'
        liveness:
          $ref: '#/components/schemas/ReliabilityHealthResult'
        overrides:
          $ref: '#/components/schemas/ReliabilityProfileOverrides'
        profile:
          $ref: '#/components/schemas/ReliabilityProfile'
        protocol:
          type: string
        readiness:
          $ref: '#/components/schemas/ReliabilityHealthResult'
        serviceId:
          type: string
        state:
          $ref: '#/components/schemas/ReliabilityServiceState'
    ReliabilityServiceState:
      type: string
      enum:
      - healthy
      - degraded
      - unavailable
    RuntimeHealth:
      type: object
      required:
      - serviceId
      - workloadId
      - storeId
      - migrationWorkloadId
      - workerWorkloadId
      - phase
      - workerPhase
      properties:
        declaredSemantics:
          type:
          - string
          - 'null'
        migrationWorkloadId:
          type: string
        phase:
          $ref: '#/components/schemas/RuntimePhase'
        reliabilityIssueCodes:
          type: array
          items:
            $ref: '#/components/schemas/ReliabilityIssueCode'
        reliabilityState:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReliabilityServiceState'
        serviceId:
          type: string
        storeId:
          type: string
        workerPhase:
          $ref: '#/components/schemas/RuntimePhase'
        workerWorkloadId:
          type: string
        workloadId:
          type: string
    RuntimePhase:
      type: string
      enum:
      - starting
      - ready
      - stopping
      - stopped
      - failed
    ServiceEventEvidence:
      type: object
      required:
      - evidenceId
      - stage
      - outcome
      - eventId
      - detail
      - recordedAt
      properties:
        deliveryId:
          type:
          - string
          - 'null'
        detail: {}
        eventId:
          type: string
        evidenceId:
          type: string
        outcome:
          type: string
        recordedAt:
          type: string
          format: date-time
        stage:
          type: string
    StorySegment:
      type: object
      required:
      - storyId
      - segmentId
      - evidenceRevision
      - source
      - operation
      - contract
      - status
      - attempt
      - startedAt
      - completedAt
      - recordedAt
      properties:
        attempt:
          type: integer
          format: int32
          minimum: 0
        causationId:
          type:
          - string
          - 'null'
        completedAt:
          type: string
          format: date-time
        contract:
          $ref: '#/components/schemas/StorySegmentContract'
        evidenceRevision:
          type: integer
          format: int32
          minimum: 0
        operation:
          $ref: '#/components/schemas/StorySegmentOperation'
        parentSegmentId:
          type:
          - string
          - 'null'
        recordedAt:
          type: string
          format: date-time
        segmentId:
          type: string
        source:
          $ref: '#/components/schemas/StorySegmentSource'
        startedAt:
          type: string
          format: date-time
        status:
          type: string
        storyId:
          type: string
        tenantId:
          type:
          - string
          - 'null'
        workflow:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/StorySegmentWorkflow'
    StorySegmentContract:
      type: object
      required:
      - contractId
      - version
      properties:
        contractId:
          type: string
        version:
          type: string
    StorySegmentFeed:
      type: object
      required:
      - protocol
      - sourceServiceId
      - retentionWindowSeconds
      - asOf
      - segments
      - nextCursor
      properties:
        asOf:
          type: string
          format: date-time
        nextCursor:
          type: string
        protocol:
          type: string
        retentionWindowSeconds:
          type: integer
          format: int64
          minimum: 0
        segments:
          type: array
          items:
            $ref: '#/components/schemas/StorySegment'
        sourceServiceId:
          type: string
        tenantId:
          type:
          - string
          - 'null'
    StorySegmentOperation:
      type: object
      required:
      - kind
      - operationId
      properties:
        kind:
          type: string
        operationId:
          type: string
    StorySegmentSource:
      type: object
      required:
      - serviceId
      - workloadId
      properties:
        serviceId:
          type: string
        workloadId:
          type: string
    StorySegmentWorkflow:
      type: object
      required:
      - instanceId
      - definitionOwner
      - definitionName
      - definitionVersion
      properties:
        compensationId:
          type:
          - string
          - 'null'
        definitionName:
          type: string
        definitionOwner:
          type: string
        definitionVersion:
          type: string
        instanceId:
          type: string
        interventionId:
          type:
          - string
          - 'null'
        parentInstanceId:
          type:
          - string
          - 'null'
        stepId:
          type:
          - string
          - 'null'
    WorkflowChildInspection:
      type: object
      required:
      - linkId
      - startId
      - definition
      - state
      - nextActions
      - createdAt
      - updatedAt
      properties:
        completionDeliveryId:
          type:
          - string
          - 'null'
        createdAt:
          type: string
          format: date-time
        definition:
          $ref: '#/components/schemas/WorkflowDefinitionIdentity'
        failure:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WorkflowFailureEvidence'
        instanceId:
          type:
          - string
          - 'null'
        linkId:
          type: string
        nextActions:
          type: array
          items:
            type: string
        startId:
          type: string
        state:
          $ref: '#/components/schemas/WorkflowChildState'
        updatedAt:
          type: string
          format: date-time
    WorkflowChildState:
      type: string
      enum:
      - waiting
      - completed
      - failed
      - unsupported_version
    WorkflowCompatibilityCategory:
      type: string
      enum:
      - safe
      - needs-attention
      - breaking
      - blocked
    WorkflowCompatibilityReason:
      type: object
      required:
      - code
      - path
      - message
      - nextAction
      properties:
        code:
          type: string
        message:
          type: string
        nextAction:
          type: string
        path:
          type: string
      additionalProperties: false
    WorkflowCompatibilityRequest:
      type: object
      required:
      - before
      - after
      properties:
        after:
          $ref: '#/components/schemas/WorkflowDefinition'
        before:
          $ref: '#/components/schemas/WorkflowDefinition'
      additionalProperties: false
    WorkflowCompatibilityResult:
      type: object
      required:
      - protocol
      - category
      - before
      - after
      - reasons
      properties:
        after:
          $ref: '#/components/schemas/WorkflowDefinitionReference'
        before:
          $ref: '#/components/schemas/WorkflowDefinitionReference'
        category:
          $ref: '#/components/schemas/WorkflowCompatibilityCategory'
        protocol:
          type: string
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowCompatibilityReason'
      additionalProperties: false
    WorkflowCompensationAttemptInspection:
      type: object
      required:
      - attemptId
      - attemptNumber
      - transitionId
      - state
      - startedAt
      properties:
        attemptId:
          type: string
        attemptNumber:
          type: integer
          format: int32
