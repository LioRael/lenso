services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lenso
      POSTGRES_PASSWORD: lenso
      POSTGRES_DB: lenso
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenso -d lenso"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:nightly
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles:
      - observability
