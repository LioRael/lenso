agent {
    data_dir = "$LENSO_SPIRE_AGENT_DIR/data"
    log_level = "INFO"
    server_address = "$LENSO_SPIRE_SERVER_ADDRESS"
    server_port = "8081"
    socket_path = "$LENSO_SPIRE_AGENT_DIR/api.sock"
    trust_bundle_path = "$LENSO_SPIRE_AGENT_DIR/bootstrap.crt"
    trust_domain = "lenso.test"
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
