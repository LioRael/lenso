server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    socket_path = "$LENSO_SPIRE_SERVER_DIR/private/api.sock"
    trust_domain = "lenso.test"
    data_dir = "$LENSO_SPIRE_SERVER_DIR/data"
    log_level = "INFO"
    default_x509_svid_ttl = "10s"
    default_jwt_svid_ttl = "1m"
    ca_ttl = "1h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "$LENSO_SPIRE_SERVER_DIR/data/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }
}
