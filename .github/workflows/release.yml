name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.3.1"
        required: true
        type: string
      notes:
        description: "Short release note summary"
        required: false
        type: string
      publish_rust_crate:
        description: "Publish the Lenso Rust crate set to crates.io"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: lenso
          POSTGRES_PASSWORD: lenso
          POSTGRES_USER: lenso
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lenso -d lenso"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: local
      DATABASE_URL: postgres://lenso:lenso@localhost:5432/lenso
      HTTP_HOST: 0.0.0.0
      LENSO_ALLOW_DEV_AUTH_ON_PUBLIC_BIND: true
      HTTP_PORT: 3000
      LENSO_RELEASE_VERSION: ${{ inputs.version }}
      RUST_LOG: info,lenso=debug
    steps:
      - uses: actions/checkout@v6
      - name: Validate Runtime Console checkout secret
        env:
          LENSO_RUNTIME_CONSOLE_DEPLOY_KEY: ${{ secrets.LENSO_RUNTIME_CONSOLE_DEPLOY_KEY }}
        run: |
          test -n "$LENSO_RUNTIME_CONSOLE_DEPLOY_KEY" || { echo "LENSO_RUNTIME_CONSOLE_DEPLOY_KEY is required to checkout lenso-runtime-console" >&2; exit 1; }
      - name: Checkout Runtime Console
        uses: actions/checkout@v6
        with:
          repository: LioRael/lenso-runtime-console
          path: lenso-runtime-console
          ssh-key: ${{ secrets.LENSO_RUNTIME_CONSOLE_DEPLOY_KEY }}
      - name: Checkout Auth Console package
        uses: actions/checkout@v6
        with:
          repository: LioRael/lenso-auth-module
          path: lenso-auth-module
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install just
        uses: extractions/setup-just@v4
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: lenso-runtime-console/package.json
          run_install: false
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: lenso-runtime-console/pnpm-lock.yaml
          node-version: 24
      - name: Check release version
        run: just release-version-check
      - name: Install Runtime Console dependencies
        working-directory: lenso-runtime-console
        run: pnpm install --frozen-lockfile
      - name: Build hosted Runtime Console
        env:
          RUNTIME_CONSOLE_ROOT: lenso-runtime-console
        run: just console-build
      - name: Run release gate
        run: just release-check
      - name: Run package publish preflight
        run: just package-readiness
      - name: Build release package
        env:
          LENSO_RELEASE_NOTES_SUMMARY: ${{ inputs.notes }}
        run: just release-package
      - name: Validate registry secrets
        if: ${{ inputs.publish_rust_crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "$CARGO_REGISTRY_TOKEN" || { echo "CARGO_REGISTRY_TOKEN is required when publishing Rust crates" >&2; exit 1; }
      - name: Publish Lenso crates to crates.io
        if: ${{ inputs.publish_rust_crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: sh scripts/publish-crates.sh
      - name: Skip registry upload
        if: ${{ !inputs.publish_rust_crate }}
        run: echo "registry publish inputs are false; uploads were skipped after dry-runs."
      - name: Upload release notes draft
        uses: actions/upload-artifact@v7
        with:
          name: lenso-${{ inputs.version }}-release-notes
          path: dist/release/lenso-${{ inputs.version }}-release-notes.md
          if-no-files-found: error
      - name: Upload release source package
        uses: actions/upload-artifact@v7
        with:
          name: lenso-${{ inputs.version }}-source
          path: dist/release/lenso-${{ inputs.version }}-source.tar.gz
          if-no-files-found: error
      - name: Upload hosted release package
        uses: actions/upload-artifact@v7
        with:
          name: lenso-${{ inputs.version }}-hosted
          path: dist/release/lenso-${{ inputs.version }}-hosted.tar.gz
          if-no-files-found: error
      - name: Upload artifact README
        uses: actions/upload-artifact@v7
        with:
          name: lenso-${{ inputs.version }}-artifact-readme
          path: dist/release/lenso-${{ inputs.version }}-artifact-readme.md
          if-no-files-found: error
      - name: Publish GitHub Release
        if: ${{ inputs.publish_rust_crate }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Lenso ${{ inputs.version }}" \
            --notes-file "dist/release/lenso-${{ inputs.version }}-release-notes.md" \
            "dist/release/lenso-${{ inputs.version }}-source.tar.gz" \
            "dist/release/lenso-${{ inputs.version }}-artifact-readme.md"
